<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Team - ACM SIGCHI SRM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Team Page Specific Styles */
        .team-hero {
            min-height: 40vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 100px;
        }

        .team-hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #1f5fd1, #1a8ecf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .team-hero p {
            font-size: 1.2rem;
            color: #4b5c78;
            max-width: 700px;
            margin: 0 auto;
        }

        .team-section {
            padding: 60px 0;
            background: transparent;
        }

        .team-category {
            margin-bottom: 70px;
        }

        .category-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1f5fd1;
            margin-bottom: 35px;
            text-align: center;
            position: relative;
            padding-bottom: 15px;
        }

        .category-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #1f5fd1, #1a8ecf);
            border-radius: 2px;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
        }

        .team-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 35px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #1f5fd1, #1a8ecf);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .team-card:hover::before {
            transform: scaleX(1);
        }

        .team-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(31, 95, 209, 0.15);
        }

        .member-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            object-fit: cover;
            border: 4px solid rgba(31, 95, 209, 0.1);
            transition: all 0.3s ease;
        }

        .team-card:hover .member-photo {
            border-color: #1f5fd1;
            transform: scale(1.05);
        }

        .member-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .member-position {
            font-size: 1rem;
            color: #1f5fd1;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .member-bio {
            font-size: 0.85rem;
            color: #6b7c96;
            line-height: 1.5;
            margin-bottom: 20px;
            word-wrap: break-word;
        }

        .member-socials {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: auto;
        }

        .member-socials a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(31, 95, 209, 0.1);
            color: #1f5fd1;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .member-socials a:hover {
            background: #1f5fd1;
            color: #ffffff;
            transform: translateY(-3px) scale(1.1);
        }

        .placeholder-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(31, 95, 209, 0.1), rgba(26, 142, 207, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(31, 95, 209, 0.15);
            transition: all 0.3s ease;
        }

        .team-card:hover .placeholder-photo {
            box-shadow: 0 0 20px rgba(31, 95, 209, 0.4);
            transform: scale(1.05);
            border-color: rgba(31, 95, 209, 0.3);
        }

        .placeholder-photo i {
            font-size: 3rem;
            color: rgba(31, 95, 209, 0.3);
            transition: all 0.3s ease;
        }

        .team-card:hover .placeholder-photo i {
            color: rgba(31, 95, 209, 0.5);
        }

        @media (max-width: 768px) {
            .team-hero h1 {
                font-size: 2.5rem;
            }

            .team-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 25px;
            }

            .team-card {
                padding: 25px;
            }

            .category-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<div class="live-bg"></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand brand" href="index.html">
            <img src="assets/logo.png" alt="ACM SIGCHI Logo">
            ACM SIGCHI SRM
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html#home">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                <li class="nav-item"><a class="nav-link" href="team.html">Team</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Team Hero -->
<section class="team-hero">
    <div class="container">
        <h1>Our Team</h1>
        <p>
            Meet the passionate individuals driving innovation and creativity at ACM SIGCHI SRM. 
            Together, we're shaping the future of human-centered technology.
        </p>
    </div>
</section>

<!-- Team Section -->
<section class="team-section">
    <div class="container">
        
        <!-- Leadership Team -->
        <div class="team-category">
            <h2 class="category-title">Leadership</h2>
            <div class="team-grid" id="leadershipTeam">
                <!-- Team members will be loaded dynamically from team.json -->
            </div>
        </div>

        <!-- 
        Technical Team - COMMENTED OUT
        <div class="team-category">
            <h2 class="category-title">Technical Team</h2>
            <div class="team-grid">
            </div>
        </div>

        Creative Team - COMMENTED OUT
        <div class="team-category">
            <h2 class="category-title">Creative Team</h2>
            <div class="team-grid">
            </div>
        </div>

        Non-Technical Team - COMMENTED OUT
        <div class="team-category">
            <h2 class="category-title">Non-Technical Team</h2>
            <div class="team-grid">
            </div>
        </div>
        -->

    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Load team data from JSON and render cards
    async function loadTeamData() {
        try {
            const response = await fetch('data/team.json');
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const data = await response.json();
            
            // Render leadership team
            const leadershipContainer = document.getElementById('leadershipTeam');
            if (leadershipContainer && data.leadership) {
                leadershipContainer.innerHTML = data.leadership.map(member => {
                    const photoHTML = member.image && member.image.trim() !== '' 
                        ? `<img src="${member.image}" alt="${member.name}" class="member-photo">`
                        : `<div class="placeholder-photo"><i class="fas fa-user"></i></div>`;
                    
                    return `
                        <div class="team-card">
                            ${photoHTML}
                            <h3 class="member-name">${member.name}</h3>
                            <p class="member-position">${member.position}</p>
                            <p class="member-bio">${member.bio}</p>
                            <div class="member-socials">
                                <a href="${member.linkedIn}" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin-in"></i></a>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        } catch (error) {
            console.error('Error loading team data:', error);
            document.getElementById('leadershipTeam').innerHTML = '<p>Error loading team data</p>';
        }
    }
    
    // Load team data when page loads
    document.addEventListener('DOMContentLoaded', loadTeamData);
</script>

</body>
</html>
